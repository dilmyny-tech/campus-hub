{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="form-box">
  <h2 style="margin-bottom:1rem;text-align:center">注册账号</h2>
  <form method="post">
    <div class="form-group"><label>昵称</label><input type="text" name="nickname" required placeholder="请输入昵称（不用真名）"></div>
    <div class="form-group"><label>手机号 / 邮箱</label><input type="text" name="account" required placeholder="请输入邮箱或手机号"></div>
    <div class="form-group"><label>密码</label><input type="password" name="password" required minlength="6" placeholder="请输入密码"></div>
    <button type="submit" class="btn btn-primary btn-block">注册</button>
  </form>
  <p style="text-align:center;margin-top:1rem;font-size:.9rem">已有账号？<a href="{{ url_for('login') }}">去登录</a></p>
</div>
{% endblock %}
